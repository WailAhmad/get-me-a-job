<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" fill="none">
  <!-- Background pill -->
  <rect width="420" height="140" rx="22" fill="#0d1626"/>

  <!-- ── AI Circuit Head ── -->
  <!-- Head outline (circuit/profile shape) -->
  <path d="M38 100 Q34 88 34 72 Q34 42 56 30 Q70 22 84 24 Q104 26 114 42 Q124 56 120 72 Q118 82 112 90 L112 100"
        stroke="#14b8a6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Circuit lines inside head -->
  <line x1="60" y1="48" x2="88" y2="48" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="88" y1="48" x2="88" y2="60" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="60" x2="104" y2="60" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="64" y1="72" x2="96" y2="72" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="72" y1="84" x2="104" y2="84" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="60" y2="84" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="104" y1="60" x2="104" y2="84" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Circuit nodes -->
  <circle cx="60" cy="48" r="3" fill="#14b8a6"/>
  <circle cx="88" cy="48" r="3" fill="#14b8a6"/>
  <circle cx="88" cy="60" r="2.5" fill="#0ea5e9"/>
  <circle cx="60" cy="60" r="2.5" fill="#0ea5e9"/>
  <circle cx="104" cy="60" r="2.5" fill="#0ea5e9"/>
  <circle cx="64" cy="72" r="2.5" fill="#14b8a6"/>
  <circle cx="96" cy="72" r="2.5" fill="#14b8a6"/>
  <circle cx="60" cy="84" r="2.5" fill="#0ea5e9"/>
  <circle cx="104" cy="84" r="2.5" fill="#14b8a6"/>
  <!-- City skyline base -->
  <path d="M38 100 L38 112 L48 112 L48 104 L54 104 L54 108 L62 108 L62 100 L72 100 L72 106 L78 106 L78 100 L88 100 L88 110 L94 110 L94 100 L104 100 L104 106 L110 106 L110 100 L112 100 L112 112 L38 112 Z"
        fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- ── Flying documents (arrows going right) ── -->
  <g opacity="0.85">
    <!-- doc 1 -->
    <rect x="126" y="38" width="18" height="22" rx="3" fill="none" stroke="#14b8a6" stroke-width="1.8"/>
    <line x1="130" y1="45" x2="140" y2="45" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="130" y1="50" x2="140" y2="50" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- arrow -->
    <path d="M148 49 L158 43" stroke="#14b8a6" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="158,43 153,41 155,46" fill="#14b8a6"/>
    <!-- doc 2 -->
    <rect x="126" y="68" width="18" height="22" rx="3" fill="none" stroke="#0ea5e9" stroke-width="1.8"/>
    <line x1="130" y1="75" x2="140" y2="75" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="130" y1="80" x2="140" y2="80" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
    <!-- arrow -->
    <path d="M148 79 L158 73" stroke="#0ea5e9" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="158,73 153,71 155,76" fill="#0ea5e9"/>
  </g>

  <!-- ── Briefcase (golden) ── -->
  <g transform="translate(158, 32)">
    <rect x="0" y="8" width="28" height="22" rx="4" fill="url(#gold)" stroke="#d97706" stroke-width="1.5"/>
    <path d="M8 8 L8 4 Q8 0 12 0 L16 0 Q20 0 20 4 L20 8" stroke="#d97706" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="19" x2="28" y2="19" stroke="#d97706" stroke-width="1.5" opacity="0.7"/>
    <circle cx="14" cy="19" r="2.5" fill="#fbbf24"/>
    <!-- glow -->
    <ellipse cx="14" cy="19" rx="16" ry="14" fill="url(#glowGold)" opacity="0.35"/>
  </g>

  <!-- ── Wordmark ── -->
  <text x="210" y="78" font-family="'Inter','SF Pro Display',system-ui,-apple-system,sans-serif"
        font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-1">JobsLand</text>
  <text x="212" y="103" font-family="'Inter','SF Pro Display',system-ui,-apple-system,sans-serif"
        font-size="15" font-weight="400" fill="#64748b" letter-spacing="0.5">Automated AI Application</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
